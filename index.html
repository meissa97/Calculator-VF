<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Helper</title>
  <link rel="icon" href="money.png"/>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="tax-conv">
    <div class="tax-chrg" id="taxes-converter">
    <h2>Money and charges</h2>
      
    <div class="form-row">
      <label for="taxes-input">Enter amount</label>
      <input type="number" id="taxes-input" placeholder="0.00" step="1" min="0" />
    </div>

    <div id="taxes-result">
      <div id="taxes-line1"></div>
      <div id="taxes-line2" class="mt-8"></div>
      <div id="taxes-line3" class="mt-8"></div>
    </div>

    </div>
<div class="conv-byte">
  <h2>Bytes Converter</h2>

  <!-- GB -->
  <div class="form-row input-with-copy">
    <label for="bytes-gb">GB</label>
    <div class="input-copy-wrap">
      <input type="number" id="bytes-gb" step="0.001" min="0" placeholder="0.000" />
      <button class="copy-btn" type="button" data-copy-target="bytes-gb" aria-label="Copy GB">
        <!-- copy icon -->
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path fill="currentColor"
            d="M16 1H4c-1.1 0-2 .9-2 2v12h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- MB -->
  <div class="form-row input-with-copy">
    <label for="bytes-mb">MB</label>
    <div class="input-copy-wrap">
      <input type="number" id="bytes-mb" step="0.1" min="0" placeholder="0.0" />
      <button class="copy-btn" type="button" data-copy-target="bytes-mb" aria-label="Copy MB">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path fill="currentColor"
            d="M16 1H4c-1.1 0-2 .9-2 2v12h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- KB -->
  <div class="form-row input-with-copy">
    <label for="bytes-kb">KB</label>
    <div class="input-copy-wrap">
      <input type="number" id="bytes-kb" step="1" min="0" placeholder="0" />
      <button class="copy-btn" type="button" data-copy-target="bytes-kb" aria-label="Copy KB">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path fill="currentColor"
            d="M16 1H4c-1.1 0-2 .9-2 2v12h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- B -->
  <div class="form-row input-with-copy">
    <label for="bytes-kb"> B<span style="color: transparent;">B</span></label>
    <div class="input-copy-wrap">
      <input type="number" id="bytes-b" step="1" min="0" placeholder="0" />
      <button class="copy-btn" type="button" data-copy-target="bytes" aria-label="B">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path fill="currentColor"
            d="M16 1H4c-1.1 0-2 .9-2 2v12h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- helper text -->
  <div style="color:var(--muted); font-size:.9rem; margin-top:4px;">
  </div>
</div>
  </div>

  <div class="red-calc">
    <h2>Red calculator:</h2>

    <!-- Red Tariff (required) -->
    <div class="form-row">
      <label for="red-tariff">Red Tariff</label>
      <select id="red-tariff" name="red-tariff">
        <option hidden value="">-- Select Red Tariff --</option>
        <option value="Red Essential">Red Essential</option>
        <option value="Essential+">Essential+</option>
        <option value="Red Advance">Red Advance</option>
        <option value="Advance+">Advance+</option>
        <option value="Red Prime">Red Prime</option>
        <option value="Prime+">Prime+</option>
        <option value="Red Elite">Red Elite</option>
        <option value="Elite+">Elite+</option>
        <option value="Red Exclusive">Red Exclusive</option>
      </select>
    </div>

    <div class="flex-row">
      <!-- DSL (optional; toggle button above the dropdown) -->
      <div class="form-row">
        <div class="toggle-group">
          <input type="checkbox" id="toggle-dsl" class="toggle">
          <label for="toggle-dsl" class="toggle-btn">Include DSL</label>
        </div>

        <div id="dsl-wrap" style="display: none;">
          <label for="dsl-bundle">DSL Bundle</label>
          <select id="dsl-bundle" name="dsl-bundle" disabled>
            <option hidden value="">-- Select DSL Bundle --</option>
            <option value="30 * 140">30 * 140</option>
            <option value="30 * 200">30 * 200</option>
            <option value="30 * 300">30 * 300</option>
            <option value="30 * 600">30 * 600</option>
            <option value="70 * 300">70 * 300</option>
            <option value="100 * 300">100 * 300</option>
            <option value="100 * 600">100 * 600</option>
            <option value="200 * 1T">200 * 1T</option>
          </select>
        </div>
      </div>

      <!-- At home (optional; toggle button above the dropdown) -->
      <div class="form-row">
        <div class="toggle-group">
          <input type="checkbox" id="toggle-athome" class="toggle">
          <label for="toggle-athome" class="toggle-btn">Include At home</label>
        </div>

        <div id="athome-wrap" style="display: none;">
          <label for="athome-bundle">At home Bundle</label>
          <select id="athome-bundle" name="athome-bundle" disabled>
            <option hidden value="">-- Select At home Bundle --</option>
            <option value="40 GB">40 GB</option>
            <option value="135 GB">135 GB</option>
            <option value="250 GB">250 GB</option>
            <option value="400 GB">400 GB</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Results -->
    <div id="result" class="mt-12"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
